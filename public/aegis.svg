<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="inner-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- 盾牌外形 -->
  <path d="M50 5 L90 20 L90 45 C90 70 70 90 50 95 C30 90 10 70 10 45 L10 20 Z" 
        fill="url(#shield-gradient)" 
        stroke="#4f46e5" 
        stroke-width="2"/>
  <!-- 内部装饰 - 希腊风格 -->
  <path d="M50 15 L80 27 L80 45 C80 65 65 80 50 85 C35 80 20 65 20 45 L20 27 Z" 
        fill="none" 
        stroke="rgba(255,255,255,0.3)" 
        stroke-width="2"/>
  <!-- 中心太阳符号（与 Helios 呼应） -->
  <circle cx="50" cy="48" r="15" fill="url(#inner-gradient)"/>
  <g fill="#fbbf24" opacity="0.9">
    <rect x="48" y="25" width="4" height="10" rx="2"/>
    <rect x="48" y="63" width="4" height="10" rx="2"/>
    <rect x="25" y="46" width="10" height="4" rx="2"/>
    <rect x="65" y="46" width="10" height="4" rx="2"/>
    <rect x="30" y="30" width="4" height="8" rx="2" transform="rotate(45 32 34)"/>
    <rect x="66" y="30" width="4" height="8" rx="2" transform="rotate(-45 68 34)"/>
    <rect x="30" y="60" width="4" height="8" rx="2" transform="rotate(-45 32 64)"/>
    <rect x="66" y="60" width="4" height="8" rx="2" transform="rotate(45 68 64)"/>
  </g>
</svg>
